# Paper A — fixed-panel, multi-seed LoRA-SFT study configuration.
#
# This file is part of the LOCK (plan sec 6.4.1 / 13.2). Every source and model
# revision below is an EXPLICIT immutable value: the manifest builder, trainer,
# scorer, and analyzer must NEVER resolve a moving `main` revision. Changing any
# value here changes the study identity and requires a fresh LOCK.json.
#
# Licensing branch: Branch A (academic_noncommercial) — ToxicChat is INCLUDED;
# BeaverTails and OR-Bench are EXCLUDED from training (plan sec 6.1 / 6.2).

schema_version: 1
study_id: paper_a_sft
data_branch: academic_noncommercial   # Branch A: include ToxicChat; non-commercial release.
data_seed: 42
data_order_seed: 42
rows_per_source: 400
rows_per_source_label: 200
train_sources:
  - toxicchat
  - prompt_injections
  - jailbreak_classification
excluded_train_sources:
  - beavertails
  - or_bench
# NOTE: the run may start with seeds [42, 43, 44] (Stage 1, first twelve cells),
# then complete [45, 46] (Stage 2). The frozen confirmatory design is all five.
seeds: [42, 43, 44, 45, 46]
max_steps: 300
max_length: 1024
effective_batch: 4
learning_rate: 0.0002
warmup_ratio: 0.03
lora:
  r: 32
  alpha: 64
  dropout: 0.05
target_fpr: 0.05
primary_metric: macro_average_precision
bootstrap_replicates: 10000
bootstrap_seed: 20260712

# ---------------------------------------------------------------------------
# Model panel (plan sec 7). Model AND tokenizer revisions are pinned to the
# candidate commit hashes; the trainer/scorer must fail rather than fall back to
# a moving `main`. trust_remote_code / dtype / attention are engineering fields.
# ---------------------------------------------------------------------------
models:
  qwen25_15b:
    model_id: Qwen/Qwen2.5-1.5B-Instruct
    model_revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306
    tokenizer_revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306
    trust_remote_code: false
    dtype: bfloat16
  smollm2_17b:
    model_id: HuggingFaceTB/SmolLM2-1.7B-Instruct
    model_revision: 31b70e2e869a7173562077fd711b654946d38674
    tokenizer_revision: 31b70e2e869a7173562077fd711b654946d38674
    trust_remote_code: false
    dtype: bfloat16
  smollm3_3b:
    model_id: HuggingFaceTB/SmolLM3-3B
    model_revision: a07cc9a04f16550a088caea529712d1d335b0ac1
    tokenizer_revision: a07cc9a04f16550a088caea529712d1d335b0ac1
    trust_remote_code: true
    dtype: bfloat16
  qwen3_4b:
    model_id: Qwen/Qwen3-4B
    model_revision: 1cfa9a7208912126459214e8b04321603b3df60c
    tokenizer_revision: 1cfa9a7208912126459214e8b04321603b3df60c
    trust_remote_code: false
    dtype: bfloat16

# ---------------------------------------------------------------------------
# Near-duplicate / family construction parameters (plan sec 6.7). Frozen.
# ---------------------------------------------------------------------------
family:
  normalization: nfkc_lower_collapsews   # guard_research.provenance.normalize_text
  minhash_num_perm: 256
  minhash_ngram: 5
  minhash_jaccard_threshold: 0.85        # candidate-generation threshold, NOT semantic proof
  lsh_bands: 32
  lsh_rows: 8
  sensitivity_thresholds: [0.80, 0.85, 0.90]

# ---------------------------------------------------------------------------
