# Regime A — encoder classifier (the latency hero)
arch: encoder
backend: transformers
base_model: answerdotai/ModernBERT-large
num_labels: 2           # binary safe/unsafe (what train_encoder builds today;
                        # per-hazard multi-class is a future extension)

train:
  epochs: 3
  lr: 2.0e-5
  batch_size: 32
  max_length: 512

output_dir: outputs/encoder-modernbert
