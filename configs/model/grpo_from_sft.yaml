# GRPO / RLVR *from the SFT checkpoint* — the recommended recipe (RL refines a
# model that already emits the verdict JSON, instead of learning format from
# scratch). Bounded for a CPU/MPS laptop run; a converged run wants a GPU.
arch: decoder
mode: reasoning
base_model: outputs/demo-decoder-sft   # start from Regime-B SFT, not the raw base
seed: 42

lora:
  r: 16
  alpha: 32
  dropout: 0.05

data:
  train: data/demo/train.jsonl

grpo:
  num_generations: 4
  batch_size: 4
  max_completion_len: 96
  steps: 60
  log_steps: 2
  lr: 1.0e-6
  kl_coef: 0.04

# Verifiable reward (label = reward); false-positive penalty bakes in over-block avoidance.
reward:
  correctness: 1.0
  category: 0.5
  format: 0.2
  false_positive_penalty: 1.0
  brevity: 0.1
  rationale_budget: 256

output_dir: outputs/grpo-qwen3-0.6b
