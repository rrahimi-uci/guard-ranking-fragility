# Evaluation config (consumed by the eval harness / scripts/eval/run_eval.sh)
mlflow:
  experiment_name: agent-bouncer
  tracking_uri: null   # null -> local ./mlruns

# Standard benchmark suite (ungated; run via scripts/eval/run_benchmarks.py).
# Grouped by axis; gated sets (WildGuardMix/HarmBench/AdvBench/PINT) need HF_TOKEN.
benchmarks:
  guardrail: [beavertails, openai_moderation, toxicchat]
  red_team: [prompt_injections, jailbreak_classification, jailbreakbench]
  over_refusal: [xstest]

# Guards to score (paths to trained checkpoints or baseline ids)
guards:
  - keyword-baseline
  # - outputs/encoder-modernbert
  # - outputs/sft-qwen3-0.6b
  # - outputs/grpo-qwen3-1.7b

baselines:
  - meta-llama/Llama-Guard-3-1B
  - google/shieldgemma-2b
  - meta-llama/Llama-Prompt-Guard-2-86M
