# Starting-type adaptation study (proposal: papers/unified-report/proposal.md)
# 2x3 blocked design: {general instruction checkpoint, released purpose-built guard}
#   x {unmodified U, +ordinary SFT, +KL-SFT}.
# The within-checkpoint deltas (SFT-U, KL-U, KL-SFT) are the controlled estimands; the KL
# reference for any checkpoint is that SAME unmodified starting checkpoint.
#
# STATUS: authoring input for the model registry. Purpose-built revisions are NOT yet pinned
# (proposal Phase 0 pins them + snapshots cards/terms before any claim-bearing GPU work).
# This file is an authoring input only; protocol/primary_contract.json is the normative source.
schema_version: 1
study_id: starting_type_adaptation_v1

# Shared, harmonized adaptation recipe (data/labels/seeds/optimizer/LoRA shared across all
# checkpoints; only the model-native prompt render + verdict serialization vary per checkpoint).
recipe:
  train_manifest_from: paper_a_sft_v2   # reuse the frozen 1,200-row Paper A manifest by hash
  seeds: [42, 43, 44, 45, 46]
  data_order_seed: 42
  max_steps: 300
  max_length: 1024
  effective_batch: 4
  per_device_batch: 1
  gradient_accumulation: 4
  learning_rate: 0.0002
  warmup_ratio: 0.03
  scheduler: cosine
  lora:
    r: 32
    alpha: 64
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  kl:
    primary_beta: 0.5            # primary KL-SFT arm (proposal 5.5)
    sensitivity_beta: [1.0]      # locked sensitivity, never test-selected
    direction: forward_kl_theta_vs_reference   # KL(pi_theta || pi_reference) on supervised verdict positions
  target_fpr: 0.05

conditions: [unmodified, sft, kl_sft]   # explicit; NEVER encode kl_sft as sft+beta

# ------------------------------------------------------------------------------------------
# Panel A: general instruction starting checkpoints (the four Paper A checkpoints).
# Revisions pinned from configs/paper_a_sft.yaml (immutable).
# ------------------------------------------------------------------------------------------
