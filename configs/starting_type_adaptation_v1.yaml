    tokenizer_revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306
    trust_remote_code: false
    dtype: bfloat16
    family: qwen
    contract: paper_a_safe_unsafe        # guard_research.prompts safe/unsafe head
  smollm2_17b:
    model_id: HuggingFaceTB/SmolLM2-1.7B-Instruct
    model_revision: 31b70e2e869a7173562077fd711b654946d38674
    tokenizer_revision: 31b70e2e869a7173562077fd711b654946d38674
    trust_remote_code: false
