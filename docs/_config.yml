# GitHub Pages (serve from /docs). Enable in Settings → Pages → Source: main /docs.
title: "Agent Bouncer — a tiny, fast LLM safety guardrail (SLM)"
description: >-
  Open-source small language model (SLM) guardrail for LLMs and AI agents:
  detects prompt injection, jailbreaks, and unsafe content on the request path.
  Fine-tuned + RL-tuned (GRPO), benchmarked against GPT-4o-mini, GPT-5.2, and
  OpenAI Moderation with an honest MLflow-style scoreboard.
theme: jekyll-theme-cayman
show_downloads: false

# Canonical URL (project page). Used by jekyll-seo-tag + jekyll-sitemap.
url: "https://rrahimi-uci.github.io"
baseurl: "/agent-bouncer"
lang: en_US

author: Reza Rahimi
logo: media/benchmark-studio.png

# SEO / social
github:
  is_project_page: true
social:
  name: Reza Rahimi
  links:
    - https://github.com/rrahimi-uci
    - https://github.com/rrahimi-uci/agent-bouncer

# Discoverability plugins (both ship with GitHub Pages).
# jekyll-sitemap auto-generates /sitemap.xml; jekyll-seo-tag emits <title>, meta
# description, Open Graph, Twitter cards, and JSON-LD (needs {% seo %} in layout).
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# After verifying the site in Google Search Console, paste the token here to
# add the <meta name="google-site-verification"> tag automatically:
# google_site_verification: "your-token-here"
