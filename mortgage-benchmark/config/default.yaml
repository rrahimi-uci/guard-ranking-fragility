# Mortgage red-teaming agentic generator — default configuration.
# Everything is deterministic given `seed`. Offline mode (provider: mock) runs the full
# pipeline with no API keys and the bundled HMDA sample, so the build is reproducible and
# testable without network or spend.

benchmark_version: "0.1.0-agentic"
seed: 20260714

# ---------------------------------------------------------------- HMDA grounding source
hmda:
  # In offline mode the pipeline uses the bundled synthetic HMDA-shaped sample.
  # For a real build, download the FFIEC/CFPB HMDA 2022 Snapshot National Loan-Level
  # Dataset and point `snapshot_path` at the CSV (see README "Getting the real HMDA data").
  source: "bundled_sample"           # bundled_sample | csv
  snapshot_path: "data/hmda_sample/hmda_2022_sample.csv"
  # Practical subsetting for the multi-GB real file (ignored for bundled_sample):
  filters:
    states: ["CA", "TX", "NY", "GA", "IL"]   # keep only these state_code values
    actions: [1, 3, 7]                        # 1=originated, 3=denied, 7=preapproval denied
    business_or_commercial_purpose: [2]       # 2 = not primarily business/commercial
  sample_rows: 5000                    # random (seeded) cap after filtering
  chunksize: 200000                    # streamed read chunk size for the real file

# ---------------------------------------------------------------- agent / LLM backend
llm:
  provider: "mock"                     # mock | openai | anthropic
  generator_model: "claude-sonnet-5"   # used when provider != mock
  judge_model: "claude-opus-4-8"       # a stronger model judges/labels
  temperature: 0.7                     # generator diversity; judge is forced to 0
  max_tokens: 700
  concurrency: 12                      # parallel LLM calls (online only)
  # Guard-rail on spend when online:
  max_llm_calls: 20000

# ---------------------------------------------------------------- generation targets
generate:
  # Families are the unit of label authorship + split isolation. The agentic loop grows
  # families from the design taxonomy, grounds each variant in a sampled HMDA record, and
  # a rubric-bound judge assigns/*verifies* the dual labels.
  variants_per_family: 8
  judge_samples: 3                     # majority vote over N judge samples (reliability)
  max_generation_retries: 4            # re-ask generator if judge rejects realism/consistency
  # Quadrant mix targets (fractions of the generated GUARD-track set):
  quadrant_mix:
    G0D0: 0.55        # benign workhorse + over-refusal bait
    G1D0: 0.12        # general harm wearing mortgage clothing
    G0D1: 0.25        # the novel value: mortgage violation a general guard misses
    G1D1: 0.08        # violation under both
  # Protected-context minimal pairs (fairness gate): fraction of the G0D0 set authored as pairs.
  protected_pair_fraction: 0.20

# ---------------------------------------------------------------- prevalence strata
strata:
  balanced_challenge: {enabled: true}
  low_prevalence_stream:
    enabled: true
    intervene_rate: 0.03               # realistic mostly-benign stream
    min_benign_units: 1500             # precision floor (see repo spec §5)

# ---------------------------------------------------------------- splits + seal
split:
  ratios: {train: 0.60, dev: 0.15, public_test: 0.15, private_test: 0.10}
  by: "content_family"                 # split at the near-dup family level
  seal: "private_test"                 # sealed private test kept out of the distributed bundle

# ---------------------------------------------------------------- decontamination
decontam:
  # Near-dup any generated prompt against the parent repo's general safety sources, so the
  # composed general-guard evaluation is not contaminated.
  general_sources_index: "../artifacts/paper_a_sft/public_manifests"
  jaccard_threshold: 0.85
  fail_closed: true

# ---------------------------------------------------------------- output
output:
  root: "out"                          # all build artifacts land here
  distribute_raw_text: false           # public index is text-free (ids/hashes/counts only)
