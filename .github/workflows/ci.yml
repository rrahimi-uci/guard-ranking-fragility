name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast lint + tests across supported Python versions (light install, no ML stack).
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check src scripts tests
      - name: Test
        run: pytest

  # Coverage gate on the recommended version, with the full stack so the torch/fastapi
  # tests actually run (they importorskip when absent). Enforces >91%.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (full stack)
        run: pip install -e '.[dev,eval,serve]'
      - name: Coverage gate (>91%)
        run: pytest --cov=agent_bouncer --cov-report=term-missing --cov-fail-under=91
